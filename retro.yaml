debug: false
secret_key: "retro-change-me"

retro:
  host: "127.0.0.1"
  port: 8500
  data_dir: "./data"
  max_concurrent_investigations: 5

sensors:
  ssh_honeypot:
    enabled: false
    port: 2222
    banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3"
  http_honeypot:
    enabled: false
    port: 8080
    server_header: "Apache/2.4.57 (Ubuntu)"
  port_scan_detector:
    enabled: false
    threshold: 10
    window_seconds: 60

protection:
  auto_block: false
  geo_block_enabled: false
  rate_limiting_enabled: false

alerting:
  desktop_notifications: true
  sound_alarm: false

llm:
  provider: ollama
  model: "mistral:7b"
  base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 2048

logging:
  level: INFO
  format: console
